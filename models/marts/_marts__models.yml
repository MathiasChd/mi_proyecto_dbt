version: 2

models:
  - name: obt_pokemon_analysis
    description: >
      One Big Table con todos los datos de Pokemon para análisis.
      Incluye información básica, tipos y clasificación de poder.
    columns:
      - name: pokemon_id
        description: "Identificador único del Pokemon"
        tests:
          - unique
          - not_null
      - name: power_tier
        description: >
          Clasificación de poder basada en base_experience:
          Legendary >= 200, Strong >= 100, Normal < 100
        tests:
          - accepted_values:
              values: ['Legendary', 'Strong', 'Normal']
      - name: base_experience
        description: "Experiencia base del Pokemon"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000